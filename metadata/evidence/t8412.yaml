# Focused Evidence — t8412 (주식 차트 N분봉 / paginated minute-bar chart)
#
# A durable, credential-free record of a genuine Paper Live Smoke that fetched a
# single chart page for a real trading day. The `line` below is captured
# VERBATIM from the `LIVE-SMOKE` stdout of
# `make live-smoke-chart LS_LIVE_SMOKE_T8412_DATE=20260617`
# (crates/ls-sdk/tests/live_smoke.rs::live_smoke_chart). The `record()` line
# drops `rsp_msg` (localized, account-identifying text) and carries only the
# numeric `rsp_cd` plus a public structural `rows` count — so a verbatim capture
# stays credential-free, matching the token/t1101 evidence shape.
#
# Secret-safety: structural descriptors and public market data only — never the
# token, appkey, secret, or account number. `symbol=005930` is a public KOSPI
# ticker; `date` is a public trading day; `rows` is a page row count.
#
# Integrity of THIS record: `rsp_cd=00000` (gateway success) plus a non-empty
# `rows` count confirm a genuine single-page chart round-trip on a real trading
# day — a non-trading day would Err with a gateway 01715 before recording. This
# proves single-page reachability only; multi-page `chart_all` correctness is
# explicitly out of the recommendation scope.
