# This record therefore proves websocket lifecycle REACHABILITY only. It does
# NOT prove trade-data correctness, in-session row delivery, or reconnection
# semantics — those are explicitly excluded from the recommendation (see
# metadata/trs/S3_.yaml `recommendation.excludes`).
#
# Integrity of THIS record: the smoke asserts the resolved WS URL carries the
# paper port `29443` (a wrong-target run fails) and that subscribe/unsubscribe
# both complete cleanly before the line is recorded.
