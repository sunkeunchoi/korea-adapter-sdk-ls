#
# A durable, credential-free record of a genuine Paper Live Smoke that proved the
# websocket subscribe lifecycle. The `line` below is captured VERBATIM from the
# `LIVE-SMOKE` stdout of `make live-smoke-ws`
# (crates/ls-sdk/tests/live_smoke.rs::live_smoke_ws), which is credential-free by
# construction (symbol + public WS port + a lifecycle note only — no token,
# appkey, secret, or account number).
#
# Scope of THIS evidence: the blocking assertion is connect → subscribe `S3_` →
