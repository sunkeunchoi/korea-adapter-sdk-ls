# TR Metadata Index — routing-only duplication of per-TR files.
#
# The per-TR files under trs/ are the source of truth (validated by the
# ls-metadata Rust types and validator). This index duplicates ONLY the fields
# needed for fast routing/selection; the validator asserts every field here
# equals its per-TR file.
#
# Evidence freshness (R9): a Recommended TR's focused evidence is valid for 90
# days from `maintenance.last_reviewed`, after which an `evidence` finding
# fires. Change-driven invalidation (R8/R10) is INACTIVE in this slice — it
# becomes operative only once the Specification Document Tracker and its
# reviewed baselines exist. Until then the 90-day backstop is the sole control.
# See EVIDENCE-FRESHNESS.md.
version: 1
trs:
  token:
    file: trs/token.yaml
    owner_class: standalone
    protocol: rest
    instrument_domain: misc
    venue_session: unspecified
  revoke:
    file: trs/revoke.yaml
    owner_class: standalone
    protocol: rest
    instrument_domain: misc
    venue_session: unspecified
  t1102:
    file: trs/t1102.yaml
    owner_class: market_session
    protocol: rest
    instrument_domain: stock
    venue_session: krx_regular
  t8412:
    file: trs/t8412.yaml
    owner_class: paginated
    protocol: rest
    instrument_domain: stock
    venue_session: krx_regular
  CSPAQ12200:
    file: trs/CSPAQ12200.yaml
    owner_class: account
    protocol: rest
    instrument_domain: stock
    venue_session: unspecified
  S3_:
    file: trs/S3_.yaml
    owner_class: realtime
    protocol: websocket
    instrument_domain: stock
    venue_session: krx_regular
