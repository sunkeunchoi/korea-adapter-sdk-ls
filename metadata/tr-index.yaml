# TR Metadata Index — routing-only duplication of per-TR files.
#
# The per-TR files under trs/ are the source of truth (validated by the
# ls-metadata Rust types and validator). This index duplicates ONLY the fields
# needed for fast routing/selection; the validator asserts every field here
# equals its per-TR file.
#
# Evidence freshness: the only operative control today is human review
# discipline anchored on the manually-set per-TR `maintenance.last_reviewed`
# date. NO code enforces freshness: nothing reads `last_reviewed` (the 90-day
# backstop is not computed) and no path emits a `Severity::Evidence` finding
# (change-driven invalidation is not wired). The API Drift and Specification
# Document Trackers exist and see changes, but acting on them to revoke a claim
# is unbuilt. The backstop, structural-change staling, advisory example
# findings, and informational-only description changes are documented intent
# pending an evaluator. See EVIDENCE-FRESHNESS.md.
version: 1
trs:
  token:
    file: trs/token.yaml
    owner_class: standalone
    protocol: rest
    instrument_domain: misc
    venue_session: unspecified
  revoke:
    file: trs/revoke.yaml
    owner_class: standalone
    protocol: rest
    instrument_domain: misc
    venue_session: unspecified
  t1102:
    file: trs/t1102.yaml
    owner_class: market_session
    protocol: rest
    instrument_domain: stock
    venue_session: krx_regular
  t8412:
    file: trs/t8412.yaml
    owner_class: paginated
    protocol: rest
    instrument_domain: stock
    venue_session: krx_regular
  CSPAQ12200:
    file: trs/CSPAQ12200.yaml
    owner_class: account
    protocol: rest
    instrument_domain: stock
    venue_session: unspecified
  S3_:
    file: trs/S3_.yaml
    owner_class: realtime
    protocol: websocket
    instrument_domain: stock
    venue_session: krx_regular
  CSPAT00601:
    file: trs/CSPAT00601.yaml
    owner_class: orders
    protocol: rest
    instrument_domain: stock
    venue_session: krx_regular
