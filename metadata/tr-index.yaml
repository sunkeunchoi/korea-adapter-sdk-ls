# TR Metadata Index — routing-only duplication of per-TR files.
#
# The per-TR files under trs/ are the source of truth (validated by the
# ls-metadata Rust types and validator). This index duplicates ONLY the fields
# needed for fast routing/selection; the validator asserts every field here
# equals its per-TR file.
#
# Evidence freshness: the only operative control today is human review
# discipline anchored on the manually-set per-TR `maintenance.last_reviewed`
# date. NO code enforces freshness: nothing computes a backstop from
# `last_reviewed` (docgen only renders it verbatim) and no path emits a
# `Severity::Evidence` finding (change-driven invalidation is not wired). The
# API Drift and Specification
# Document Trackers exist and see changes, but acting on them to revoke a claim
# is unbuilt. The backstop, structural-change staling, advisory example
# findings, and informational-only description changes are documented intent
# pending an evaluator. See EVIDENCE-FRESHNESS.md.
