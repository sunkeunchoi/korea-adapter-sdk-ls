tr_code: CSPAT00801
name: 현물취소주문 (cash equity order cancel)
owner_class: orders
facets:
  protocol: rest
  instrument_domain: stock
  venue_session: krx_regular
  date_sensitive: false
  self_paginated: false
  account_state: true
  paper_incompatible: false
  certification_path: manual
  rate_bucket: orders
  # IsuNo (종목번호) and OrgOrdNo (원주문번호) are the caller-supplied inputs that
  # select the order being canceled. OrdQty is the cancel quantity, not an
  # identifier.
  caller_supplied_identifiers: [OrgOrdNo, IsuNo]
dependencies:
  self_continuation_fields: []
  # Order-identity fields — the semantically strong inputs that define a unique
  # cancel for deduplication. A cancel re-sent identically within the dedup TTL is
  # the "same order" action (the OrgOrdNo it targets is already gone), so it must
  # dedup rather than re-dispatch.
  strong_order_fields: [OrgOrdNo, IsuNo, OrdQty]
support:
  # Recommended: cancel leg certified on a clean in-window guarded paper
  # order-chain smoke (rsp_cd 00463 취소주문 완료; `make live-smoke-order-chain`,
  # plan 2026-06-30-002), the live order-placement evidence ADR 0008 deferred the
  # Recommended endorsement on. The cancel is the chain's primary teardown and the
  # account was positively confirmed flat after the run.
  tracked: true
  implemented: true
  recommended: true
maintenance:
  source_spec_hash: be317c823cc5
  last_reviewed: 2026-06-30
recommendation:
  behavior: Paper cash-equity order CANCEL (현물취소주문) of a live resting order (primary teardown), single lifecycle
  evidence_ref: evidence/CSPAT00801.yaml
  excludes:
    - Production-credential order cancellation (evidence is paper only)
    - Partial fills / unexpected fills (evidence is a non-marketable resting cancel)
    - Cancel behavior during halts/VI or outside KRX regular session
    - Multi-symbol / basket cancellation (single-symbol evidence)
    - Behavior beyond the single proven submit→modify→cancel lifecycle
    - Auto-revoking the recommendation on a change-driven structural change — detection ships; auto-revoke of support.recommended stays deferred
