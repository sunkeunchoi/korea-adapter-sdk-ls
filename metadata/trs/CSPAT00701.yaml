tr_code: CSPAT00701
name: 현물정정주문 (cash equity order modify)
owner_class: orders
facets:
  protocol: rest
  instrument_domain: stock
  venue_session: krx_regular
  date_sensitive: false
  self_paginated: false
  account_state: true
  paper_incompatible: false
  certification_path: manual
  rate_bucket: orders
  # IsuNo (종목번호) and OrgOrdNo (원주문번호) are the caller-supplied inputs that
  # select the order being modified. The remaining required fields (OrdQty/OrdPrc/
  # OrdprcPtnCode/OrdCndiTpCode) are the new target values, not identifiers.
  caller_supplied_identifiers: [OrgOrdNo, IsuNo]
dependencies:
  self_continuation_fields: []
  # Order-identity fields — the semantically strong inputs that define a unique
  # modify for deduplication. A modify is absolute (it carries the full target
  # OrdQty/OrdPrc), so two identical re-sends against the same OrgOrdNo are the
  # "same order" action and must dedup.
  strong_order_fields: [OrgOrdNo, IsuNo, OrdQty, OrdPrc]
support:
  # Recommended: modify leg certified on a clean in-window guarded paper
  # order-chain smoke (rsp_cd 00462 정정주문 완료; `make live-smoke-order-chain`,
  # plan 2026-06-30-002), the live order-placement evidence ADR 0008 deferred the
  # Recommended endorsement on. The account was positively confirmed flat after the
  # run. See docs/design/order-safety-design.md.
  tracked: true
  implemented: true
  recommended: false
maintenance:
  source_spec_hash: bfd073603ce2
  last_reviewed: 2026-06-30
