tr_code: t0425
name: 주식체결/미체결 (stock filled/unfilled order inquiry)
# Read-only order/execution inquiry — the reconciliation companion to the
# CSPAT00601 submit. Classed `paginated` (not `account`) because it self-continues
# on the `cts_ordno` order-number cursor; routed through the market_data bucket
# (KTD5). is_order is false — this is a read.
owner_class: paginated
facets:
  protocol: rest
  instrument_domain: stock
  venue_session: krx_regular
  date_sensitive: false
  self_paginated: true
  account_state: false
  paper_incompatible: false
  certification_path: none
  rate_bucket: market_data
  # `expcode` (종목번호) is the only caller-supplied identifier; chegb/medosu/sortgb
  # are mode/filter flags and cts_ordno is the pagination cursor — none are
  # identifiers.
  caller_supplied_identifiers: [expcode]
dependencies:
  self_continuation_fields: [cts_ordno]
  strong_order_fields: []
support:
  # Recommended: order-reconciliation read exercised by a clean in-window guarded
  # paper order-chain smoke (returned valid 완료/정정확인 rows; the account-flat scan
  # confirmed the book flat; `make live-smoke-order-chain`, plan 2026-06-30-002).
  # The reconciliation companion to the CSPAT00601 submit, promoted alongside the
  # order legs it reconciles.
  tracked: true
  implemented: true
  recommended: true
maintenance:
  source_spec_hash: e6eff49b1783
  last_reviewed: 2026-06-30
recommendation:
  behavior: Paper filled/unfilled order inquiry (주식체결/미체결) read for one symbol — order reconciliation
  evidence_ref: evidence/t0425.yaml
  excludes:
    - Production-credential reconciliation reads (evidence is paper only)
    - Fields outside the modeled order-row subset (ordno/orgordno/status/ordrem/cheqty)
    - Read correctness outside KRX regular session
    - Exhaustive account-wide history pagination (evidence is a single-symbol working-orders read)
    - Auto-revoking the recommendation on a change-driven structural change — detection ships; auto-revoke of support.recommended stays deferred
