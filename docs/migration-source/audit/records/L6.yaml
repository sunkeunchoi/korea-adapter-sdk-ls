row_id: L6
area: Order acknowledgement codes
classification: knowledge
verdict: confirmed
bar_applied: completeness-vs-source (summary-plus-snapshot)
evidence_pointer: docs/design/ls-gateway-response-semantics.md
provenance:
  # Non-load-bearing — old source, read-only sibling checkout, will vanish on decommission.
  - korea-broker-sdk-ls/crates/core/tests/api_error_tests.rs

knowledge:
  extraction_mode: summary-plus-snapshot
  source_documents:
    - crates/core/tests/api_error_tests.rs
  claim_map:
    - claim_text: >-
        A successful CSPAT00601 buy order returns the order-completion code 00040
        (not the read-only query success code 00000); the order dispatch path must
        treat 00040 as success.
      target_location: docs/design/ls-gateway-response-semantics.md#order-specific-codes
      status: present
    - claim_text: >-
        A successful CSPAT00601 sell order (BnsTpCode "1") returns the
        sell-completion code 00039; the order dispatch path must treat 00039 as
        success, not an error, otherwise a retry would bypass the dedup cache and
        place a duplicate sell.
      target_location: docs/design/ls-gateway-response-semantics.md#order-specific-codes
      status: present
    - claim_text: >-
        A successful CSPAT00701 modify order returns the modify-completion code
        00462, empirically confirmed against the live LS paper-trading gateway on
        2026-05-21; the order dispatch path must treat 00462 as success, not an
        error. (The earlier assumed code 00041 was disproven and removed.)
      target_location: docs/design/ls-gateway-response-semantics.md#order-specific-codes
      status: present
    - claim_text: >-
        A successful CSPAT00801 cancel order returns the cancel-completion code
        00463, empirically confirmed against the live LS paper-trading gateway on
        2026-05-21; the published LS spec example uses 00156, and both 00463 and
        00156 are whitelisted so the SDK handles either; the order dispatch path
        must treat them as success.
      target_location: docs/design/ls-gateway-response-semantics.md#order-specific-codes
      status: present
    - claim_text: >-
        A rejected CSPAT00601 order (price-band code 01427) is not an
        acknowledgement code and must still surface as LsError::ApiError preserving
        the broker code.
      target_location: docs/design/ls-gateway-response-semantics.md#order-specific-codes
      status: present
    - claim_text: >-
        A rejected CSPAT00701 modify (price-limit code 03181, the published LS
        rejection example) must still surface as LsError::ApiError, not be
        misclassified as a success.
      target_location: docs/design/ls-gateway-response-semantics.md#order-specific-codes
      status: present
    - claim_text: >-
        Order-acknowledgement codes are order-scoped: 00040 (buy), 00462 (modify),
        and 00463/00156 (cancel) are NOT success codes for a non-order TR and must
        surface as LsError::ApiError when returned on a non-order endpoint
        (scope enforcement) — the read-only success predicate must never accept
        them, or a future order success predicate could misclassify a completed
        modify/cancel as an error.
      target_location: docs/design/ls-gateway-response-semantics.md#order-specific-codes
      status: present
    - claim_text: >-
        Order response classification is separate from read-only query
        classification: the read-only success predicate (00000/empty/00136/00707)
        is insufficient for orders, and a future order runtime must define an
        explicit order success predicate that treats the order acknowledgement
        codes as success while keeping rejected orders as LsError::ApiError with
        the broker code/message preserved.
      target_location: docs/design/order-safety-design.md#1-no-retry-dispatch
      status: adapted
    - claim_text: >-
        A rejected order (quantity-error code 10010099) returns an error and must
        NOT populate the order dedup cache, so a second identical submission still
        reaches the gateway rather than returning a cached result (API-02/API-03);
        only the cached response of an accepted order is replayed within the TTL
        window.
      target_location: docs/design/order-safety-design.md#2-deduplication-cache-with-opportunistic-expired-entry-sweeps
      status: adapted
