# Claim split (R6/R6.x): only the transport lessons the passing tests actually
# exercise are confirmed; lessons the suite does not cover are recorded
# unverifiable below and NOT folded into the confirm.
#
# CONFIRMED — exercised by passing tests in crates/ls-core/src/*.rs #[cfg(test)]:
#   - Token handling: single-flight refresh fetches exactly once under concurrency;
#     caches within expiry; fail-closed on zero/negative expire_in; expire_in
#     defaults to 24h when absent; expires_in alias accepted; revoke on OK envelope;
#     non-OK token envelope caches nothing; token Debug redacts the secret value.
#     (auth.rs tests)
#   - Env resolution: paper/legacy-fallback env var resolution, primary-wins,
#     exact missing-var error message, missing-required-var error; Debug redacts
#     credentials. (config.rs / config_resolve.rs tests)
#   - HTTP dispatch: POST sends tr_cd + default tr_cont="N" request headers and
#     deserializes the JSON envelope; non-success rsp_cd on 2xx surfaces ApiError;
#     01900 classifies as paper-incompatible on both 2xx and non-2xx.
#     (inner.rs tests, wiremock — offline)
#   - Retry: retryable transport/5xx error retries up to the cap and charges the
#     rate bucket each attempt; non-retryable error does not retry. (inner.rs)
#   - Rate buckets: manager constructs for all categories with defaults/overrides;
#     zero rate rejected per category; first wait under rate returns promptly
#     (GCRA). (rate_limiter.rs)
#   - tr_cont headers: default tr_cont="N" asserted on dispatch; pagination
#     collect_all walks two pages and returns PaginationLimit when truncated.
#     (inner.rs)
#   - Timeout config RESOLUTION: connect/request/ws timeout defaults and overrides
#     resolve to the expected Durations. (config_resolve.rs)
#   - Parse helpers: price (integer/decimal/comma), quantity, rate, signed-delta
#     parsing incl. malformed/empty/sign rejection and precision. (parse.rs)
#   - Client construction: rejects empty appkey field; synchronous no-IO build;
#     URL scheme validation (rejects http non-loopback / ftp, allows loopback with
#     flag, production https passes). (client.rs)
#
# UNVERIFIABLE sub-claims (named, NOT confirmed, NOT folded into the confirm):
#   - timeout-FIRING behavior against a slow/unresponsive gateway: connect_timeout
#     and request_timeout are wired onto the reqwest builder and their RESOLUTION
#     is tested, but no passing offline test forces a timeout to actually elapse.
#   - live gateway token issuance / dispatch against a real LS endpoint: the
#     offline suite uses a mock server only.
# These require a gateway/credential not present offline (AE5). The row verdict is
# `confirmed` strictly on the lessons the passing tests exercise (listed above);
# the sub-claims here are split out per the bar and routed to maintainer
# acceptance in the roll-up, never folded into this behavioral confirm.
