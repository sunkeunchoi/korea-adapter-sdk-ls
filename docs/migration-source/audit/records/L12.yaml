    # --- The module-gating rule that bounds the matrix (decision-relevant constraint) ---
    - claim_text: >-
        STRONG order-number edges are gated to the same instrument module: OrdNo/OrgOrdNo are
        shared raw names across stock / futures_options / overseas_stock, so the module is the
        true domain boundary and a domestic order-modify never links to an overseas-stock order
        number.
      target_location: docs/design/tr-dependency-inventory-snapshot.md#derivation-rules-preserved
      status: present
    # --- The alias basis that defines the order-number family (preserved in the snapshot) ---
    - claim_text: >-
        The order-number family that produces STRONG edges is the curated alias map. concept
        order_no covers raw names OrdNo, OrgOrdNo, PrntOrdNo, RsvOrdNo, SpareOrdNo, SrtOrdNo,
        SrtOrdNo2, ordno, sOrdNo, sOrgOrdNo, sPrntOrdNo; concept ovrs_futs_order_no covers
        OvrsFutsOrdNo, OvrsFutsOrdNo2, OvrsFutsOrgOrdNo, OvrsFutsOrgOrdNo2; concept
        fund_order_no covers FundOrdNo, FundOrgOrdNo; concept fcm_order_no covers FcmOrdNo.
      target_location: docs/migration-source/tr-dependencies-2026-06-14.json#alias_map
      status: present
