    # --- Strength definition (the decision-relevant rule that makes an edge STRONG) ---
    - claim_text: >-
        STRONG is defined as a cross-TR coupling where the consuming request field is
        required: Y and is an order number sourced from another TR's response. NORMAL is
        the same coupling but with the consuming field required: N; there are NONE in the
        current spec — every order-number request field is required: Y. The strength scale
        rates cross-TR couplings only; environmental dimensions (credential, market/session,
        time) are orthogonal tags, never points on this scale.
      target_location: docs/design/tr-dependency-inventory-snapshot.md#derivation-rules-preserved
      status: present
    - claim_text: >-
        Every STRONG order-number edge in the snapshot carries strength="STRONG" with
        required="Y"; no edge in the snapshot carries strength="NORMAL", matching the source
        fact that the current spec contains no NORMAL order-number couplings.
      target_location: docs/migration-source/tr-dependencies-2026-06-14.json#rows[].cross_tr_edges[].strength
      status: present
