# Decommission audit record — L19 (Diagnostics/redaction contract)
#
# A durable, credential-free record of one ledger-row audit, captured while the
# old source was still readable. Self-contained (R13/R14): the evidence pointer
# resolves inside this repo or inline; old-source paths appear only as
# non-load-bearing provenance.
#
# Secret-safety: no token, appkey, secret, account number, or rsp_msg in any
# transcribed or free-text field (line / claim_text / acceptance_reason). This
# row is about redaction; every claim_text describes the redaction contract by
# role/structure and transcribes NO credential field-name VALUE or flagged
# credential token, so the committed record stays credential-free.

row_id: L19
area: Diagnostics/redaction contract
classification: knowledge
verdict: confirmed
bar_applied: completeness-vs-source (full-transcription)
evidence_pointer: docs/operations/operator-diagnostics.md
provenance:
  # non-load-bearing — old source, read-only sibling checkout korea-broker-sdk-ls
  - docs/DIAGNOSTICS_CONTRACT.md
  - docs/OBSERVABILITY_AND_DIAGNOSTICS.md

knowledge:
  extraction_mode: full-transcription
  source_documents:
    - docs/DIAGNOSTICS_CONTRACT.md
    - docs/OBSERVABILITY_AND_DIAGNOSTICS.md
  claim_map:
    # --- Mechanism / nature of the contract ---
    - claim_text: >-
        Diagnostics use the tracing mechanism, not a typed diagnostics API; the
        contract stabilizes field names that downstream log pipelines depend on
        for release and incident workflows.
      target_location: docs/operations/operator-diagnostics.md#diagnostic-fields
      status: present
    # --- Contracted diagnostic fields (present in target field table) ---
    - claim_text: >-
        REST dispatch contracts the fields tr_code, path, category,
        retry_attempt, http_status, rsp_cd, and latency_ms; retry_attempt is
        non-order only and must not appear as automatic retry evidence for
        order TRs.
      target_location: docs/operations/operator-diagnostics.md#diagnostic-fields
      status: present
    - claim_text: >-
        Auth contracts the fields hit (whether a cached token was used) and url
        (which must not contain credential material).
      target_location: docs/operations/operator-diagnostics.md#diagnostic-fields
      status: present
    - claim_text: >-
        Rate limiting contracts the fields category (bucket charged) and wait_ms
        (logged only when the wait is operationally visible).
      target_location: docs/operations/operator-diagnostics.md#diagnostic-fields
      status: present
    - claim_text: >-
        Order deduplication contracts tr_code, dedup_hit (true means no new HTTP
        dispatch), and category (must be Orders for generated order TRs).
      target_location: docs/operations/operator-diagnostics.md#diagnostic-fields
      status: adapted
    - claim_text: >-
        WebSocket lifecycle contracts tr_cd, tr_key, reconnect (distinguishes
        initial connect from reconnect), subscription_count (replayed or active
        subscriptions), and attempt (reconnect-failure attempt number).
      target_location: docs/operations/operator-diagnostics.md#diagnostic-fields
      status: present
    - claim_text: >-
        WebSocket backpressure contracts tr_cd, tr_key, channel_capacity,
        overflow_policy (DropNewest, LatestOnly, or a future policy), and
        dropped_count (cumulative count of frames dropped due to backpressure).
      target_location: docs/operations/operator-diagnostics.md#diagnostic-fields
      status: present
    # --- v1.1 cumulative dropped_count behavior ---
    - claim_text: >-
        The per-frame dropped-frame warn! is replaced by a cumulative
        dropped_count logged once per subscriber channel close (receiver
        dropped), reducing log noise while preserving the diagnostic signal; no
        separate metric counter exists, so operators extract dropped_count from
        the subscriber-drop warning.
      target_location: docs/operations/operator-diagnostics.md#websocket-backpressure
      status: adapted
    # --- channel_capacity fixed value / configurability (NOW PRESENT) ---
    - claim_text: >-
        channel_capacity is fixed at 64 (the tokio channel size) and becomes
        configurable beyond the original v1.1 baseline (the WsBackpressureConfig
        work).
      target_location: docs/operations/operator-diagnostics.md#websocket-backpressure
      status: adapted
    # --- Redaction guarantees (described by role; no credential token transcribed) ---
    - claim_text: >-
        The SDK must never record in diagnostics: the application credential key,
        the application confidential key, the brokerage account identifier,
        access tokens, refresh/revoke tokens, or full request/response bodies by
        default.
      target_location: docs/operations/operator-diagnostics.md#redaction-guarantees
      status: present
    - claim_text: >-
        Defense-in-depth naming rule: any tracing span field whose name contains
        the credential-like field-name fragments for the app key, the app
        credential, a token, or an account (case-insensitive) must not be recorded, beyond the type-level
        Debug-impl redaction.
      target_location: docs/operations/operator-diagnostics.md#redaction-guarantees
      status: present
    - claim_text: >-
        Use Debug formatting for SDK config/error types so redaction impls apply;
        do not manually log raw config fields, raw WebSocket frames, OAuth
        responses, or account-bearing order evidence. LS WebSocket ACK frames can
        echo session tokens, so malformed-frame logging must use fixed messages
        without frame text.
      target_location: docs/operations/operator-diagnostics.md#redaction-guarantees
      status: present
    # --- Specific Debug-redaction enforcement (NOW PRESENT) ---
    - claim_text: >-
        Specific Debug-redaction enforcement: LsConfig redacts its app key, its
        confidential key, and its account identifier; TokenData redacts its
        access token; generated credential structs redact their app key — each
        verified by a Debug-output test or generator invariant test, with
        skip_all on instrumented dispatch methods so no parameter is auto-recorded.
      target_location: docs/operations/operator-diagnostics.md#redaction-guarantees
      status: present
    # --- Compatibility / stability policy of the contract (NOW PRESENT) ---
    - claim_text: >-
        Adding a field is allowed in a minor release; removing or renaming a
        contracted field requires a release-note callout; changing a field's
        meaning requires Public API Boundary Review even when Rust SemVer does
        not detect it.
      target_location: docs/operations/operator-diagnostics.md#field-compatibility-policy
      status: present
    - claim_text: >-
        Field-meaning-change examples include retry_attempt changing from 1-based
        to 0-based and http_status changing from an HTTP code to an
        application-level code; adding a new value range (e.g. a new category
        value) is NOT a field-meaning change.
      target_location: docs/operations/operator-diagnostics.md#field-compatibility-policy
      status: present
    - claim_text: >-
        Deprecation guidance: when removing a field keep it present (possibly
        empty) for one minor release cycle before removal in a major release;
        when renaming a field keep the old name as an alias for one minor release
        cycle. A fixed release-note callout format applies to removed, renamed,
        and meaning-changed fields.
      target_location: docs/operations/operator-diagnostics.md#field-compatibility-policy
      status: present
    - claim_text: >-
        A future typed diagnostics API (e.g. a DiagnosticEvent struct) is
        deferred and must be designed separately; it is not implied by this
        contract. There is no stable diagnostics schema today and contracted
        field names are pinned to the tracing instrument annotations.
      target_location: docs/operations/operator-diagnostics.md#field-compatibility-policy
      status: present
