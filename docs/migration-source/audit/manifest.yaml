# Decommission Audit Manifest — dispatch input for the `audit-carried-rows` fleet
#
# One entry per ledger row in `docs/migration-source-extraction-ledger.md`
# (24 `carried` + 2 `discard` = 26). Each entry pairs a stable `id` (L1…L26)
# with the area name and the pointers a fresh per-row auditor needs. This file is
# the AUTHORITY for the `L<N>` <-> area mapping; the committed validator
# (`crates/ls-trackers/tests/decommission_audit.rs`) reconciles it 1:1 against the
# IDs parsed from the ledger table, so a future ledger reorder cannot silently
# re-map an ID.
#
# `candidate_class` and `candidate_extraction_mode` SEED the auditor — they do not
# bind it. R5 keeps the recorded classification the agent's own judgment; an agent
# that finds a runnable test for a knowledge-seeded row (or a design-only target
# for a behavioral-seeded row) records its own class in the row record and the
# validator checks the record, not this seed.
#
# Old-source paths are in the OLD repo (`korea-broker-sdk-ls`) and are provenance
# only — they are not load-bearing for a confirmed record (R13). Target paths are
# in THIS repo.
